{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangarin — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #fdf8f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border: 1px solid #f0e0d0;
      border-radius: 14px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 2px 16px rgba(180,100,40,0.07);
    }
    .logo { font-size: 24px; font-weight: 800; color: #2c1a0e; margin-bottom: 4px; }
    .logo span { color: #f97316; }
    .subtitle { font-size: 13px; color: #b89080; margin-bottom: 28px; }
    .label { display: block; font-size: 11px; font-weight: 700; color: #7a5540; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .input { width: 100%; border: 1px solid #e8cdb8; border-radius: 7px; padding: 10px 12px; font-family: inherit; font-size: 14px; color: #2c1a0e; background: #fff; outline: none; margin-bottom: 16px; transition: border-color 0.15s, box-shadow 0.15s; }
    .input:focus { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,0.10); }
    .input::placeholder { color: #b89080; }
    .btn { width: 100%; padding: 11px; background: #f97316; color: #fff; border: none; border-radius: 8px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .btn:hover { background: #ea6a05; }
    .error { background: rgba(220,38,38,0.07); border-left: 3px solid #dc2626; color: #dc2626; border-radius: 6px; padding: 9px 12px; font-size: 13px; margin-bottom: 16px; }
    .divider { display: flex; align-items: center; gap: 10px; color: #b89080; font-size: 12px; margin: 16px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #f0e0d0; }
    .social-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 10px; border: 1px solid #f0e0d0; border-radius: 8px; background: #fff; font-family: inherit; font-size: 13px; font-weight: 600; color: #7a5540; text-decoration: none; margin-bottom: 8px; transition: all 0.15s; }
    .social-btn:hover { background: #fff7f0; border-color: #f97316; color: #f97316; }
    .register-link { text-align: center; font-size: 13px; color: #b89080; margin-top: 20px; }
    .register-link a { color: #f97316; font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Han<span>garin</span></div>
  <div class="subtitle">Sign in to your account</div>

  {% if form.non_field_errors %}
    <div class="error">{{ form.non_field_errors.0 }}</div>
  {% endif %}

  <form method="post" action="{% url 'account_login' %}">
    {% csrf_token %}
    <label class="label">Username or Email</label>
    <input type="text" name="login" class="input" placeholder="Enter username or email" required>
    <label class="label">Password</label>
    <input type="password" name="password" class="input" placeholder="Enter password" required>
    <button type="submit" class="btn">Sign In</button>
  </form>

  <div class="divider">or continue with</div>

  <a href="{% provider_login_url 'google' %}" class="social-btn">
    <svg width="16" height="16" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Continue with Google
  </a>

  <div class="register-link">
    Don't have an account? <a href="{% url 'account_signup' %}">Register</a>
  </div>
</div>
</body>
</html>
